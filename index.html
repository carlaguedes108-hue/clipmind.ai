<!DOCTYPE html>
<html>
<head>
<title>ClipMind AI</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
margin-top:50px;
}

video{
width:500px;
margin-top:20px;
}

button{
padding:12px;
margin:10px;
font-size:16px;
background:#22c55e;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>ClipMind AI</h1>
<p>Editor de vídeo com inteligência artificial</p>

<div class="container">

<input type="file" id="upload" accept="video/*">

<br>

<video id="video" controls></video>

<br>

<button onclick="gerarLegenda()">Gerar legenda IA</button>

<button onclick="cortarVideo()">Cortar vídeo</button>

</div>

<script>

let video = document.getElementById("video")

document.getElementById("upload").onchange = function(e){
let file = e.target.files[0]
video.src = URL.createObjectURL(file)
}

function gerarLegenda(){
alert("IA gerando legenda... (versão futura)")
}

function cortarVideo(){
alert("Ferramenta de corte em desenvolvimento")
}

</script>

</body>
</html>
